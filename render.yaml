databases:
  - name: optionsai-db
    plan: free
    databaseName: optionsai
    user: optionsai_user

services:
  - type: web
    name: optionsai
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: MPLBACKEND
        value: Agg
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: optionsai-db
          property: connectionString
