<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceder — Small Smart Tools</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/landing.css">
</head>
<body>

  <nav class="site-nav" aria-label="Navegación principal">
    <a href="/" class="logo">Small Smart Tools</a>
    <ul class="nav-links" id="navMenu">
      <li><a href="/">Inicio</a></li>
      <li><a href="/subscribe">Suscribirse</a></li>
      <li><a href="/login" style="color:var(--primary-text)">Acceder</a></li>
    </ul>
    <button class="menu-toggle" aria-label="Abrir menú" aria-expanded="false" aria-controls="navMenu" id="menuToggle">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <div class="page-center">
    <div class="page-card" style="max-width:420px;">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:8px">
        <span style="font-size:1.8rem">🧰</span>
        <span style="font-size:1.3rem;font-weight:800;color:var(--primary-text)">Small Smart Tools</span>
      </div>
      <p style="color:var(--text-muted);font-size:.875rem;margin-bottom:2rem">Secure access via magic link</p>
      {% if error %}<div class="alert-info" style="border-color:var(--danger);background:var(--danger-bg);color:var(--danger)">⚠ {{ error }}</div>{% endif %}
      <label class="form-label" for="email">Your email address</label>
      <input type="email" id="email" class="form-input" placeholder="you@example.com" autocomplete="email">
      <div id="msg" class="msg"></div>
      <button class="btn btn-block" id="btn" onclick="sendLink()" style="margin-top:16px">⚡ Send Magic Link</button>
      <div style="margin-top:24px;text-align:center;color:var(--text-muted);font-size:.8rem">
        <span>🔒 No password needed — one-time secure link, expires in 15 min.</span>
        <br><br>
        <a href="/subscribe" style="color:var(--primary-text);text-decoration:none">Subscribe for €0.95/mo</a> · <a href="/account" style="color:var(--primary-text);text-decoration:none">My Account</a>
      </div>
    </div>
  </div>

  <footer class="site-footer">
    <p>&copy; <span id="year">2025</span> Small Smart Tools. All rights reserved.</p>
  </footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
    async function sendLink() {
      const email = document.getElementById('email').value.trim();
      const btn   = document.getElementById('btn');
      const msg   = document.getElementById('msg');
      if (!email || !email.includes('@')) {
        showMsg('Please enter a valid email address.', 'error'); return;
      }
      btn.disabled = true;
      btn.textContent = 'Sending...';
      msg.style.display = 'none';
      try {
        // Fetch a fresh CSRF token before sending to avoid stale-token errors
        let csrfToken = '{{ csrf_token() }}';
        try {
          const csrfRes = await fetch('/api/csrf-token');
          if (csrfRes.ok) {
            const csrfData = await csrfRes.json();
            if (csrfData.csrf_token) csrfToken = csrfData.csrf_token;
          }
        } catch(_) {}

        const res  = await fetch('/auth/request', {
          method: 'POST',
          headers: {'Content-Type': 'application/json', 'X-CSRF-Token': csrfToken},
          body: JSON.stringify({email})
        });

        let data;
        try {
          data = await res.json();
        } catch(_) {
          // Server returned non-JSON (HTML error, 502, etc.)
          showMsg('\u26a0 Server error (' + res.status + '). Please try again.', 'error');
          btn.disabled = false;
          btn.textContent = '\u26a1 Send Magic Link';
          return;
        }

        if (data.ok) {
          showMsg('\u2713 Magic link sent! Check your inbox (and spam folder).', 'success');
          btn.textContent = '\u2713 Email Sent';
        } else {
          showMsg('\u26a0 ' + (data.error || data.message || 'Something went wrong.'), 'error');
          btn.disabled = false;
          btn.textContent = '\u26a1 Send Magic Link';
        }
      } catch(e) {
        showMsg('\u26a0 Connection error. Check your internet and try again.', 'error');
        btn.disabled = false;
        btn.textContent = '\u26a1 Send Magic Link';
      }
    }
    function showMsg(text, type) {
      const el = document.getElementById('msg');
      el.textContent = text;
      el.className = 'msg ' + type;
      el.style.display = 'block';
    }
    document.getElementById('email').addEventListener('keydown', e => {
      if (e.key === 'Enter') sendLink();
    });

    // Hamburger menu
    const toggle = document.getElementById('menuToggle');
    const menu   = document.getElementById('navMenu');
    toggle.addEventListener('click', () => {
      const open = menu.classList.toggle('active');
      toggle.classList.toggle('active');
      toggle.setAttribute('aria-expanded', open);
    });
    menu.querySelectorAll('a').forEach(l => l.addEventListener('click', () => { menu.classList.remove('active'); toggle.classList.remove('active'); }));
  </script>
</body>
</html>
